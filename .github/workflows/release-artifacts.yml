name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    env:
      GOOS: linux
      VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build package
        run: |
          make package GOOS=${GOOS} GOARCH=${{ matrix.goarch }} RUNC_ARCH=${{ matrix.goarch }} VERSION=${VERSION}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: runk-${{ env.VERSION }}-linux-${{ matrix.goarch }}
          path: dist/*.tar.gz

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          tag_name: ${{ env.VERSION }}
          fail_on_unmatched_files: true
          overwrite_files: true
